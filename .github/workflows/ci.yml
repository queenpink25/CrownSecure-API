name: CrownSecure API CI/CD Pipeline

on:
push:
branches: [ main ]
pull_request:
branches: [ main ]

jobs:
test-build:
runs-on: ubuntu-latest

```
steps:
- name: Checkout Code
  uses: actions/checkout@v4

- name: Set up Python
  uses: actions/setup-python@v5
  with:
    python-version: '3.10'

- name: Install Dependencies
  run: |
    python -m pip install --upgrade pip
    pip install fastapi uvicorn pytest httpx python-jose bcrypt

- name: Run Tests
  run: |
    pytest

- name: Lint Code
  run: |
    pip install flake8
    flake8 .

- name: Run App Check
  run: |
    uvicorn main:app --host 127.0.0.1 --port 8000 &
    sleep 5
    curl http://127.0.0.1:8000/docs
```
